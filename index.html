<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tile Studio</title>
  <style>
    body { margin: 0; background: #0b0f14; }
    canvas { display: block; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js'
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js'
import { RGBELoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/RGBELoader.js'
import { RectAreaLightUniformsLib } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/lights/RectAreaLightUniformsLib.js'
import { RectAreaLightHelper } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/helpers/RectAreaLightHelper.js'

RectAreaLightUniformsLib.init()

// ------------------------------------
// Renderer
// ------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.physicallyCorrectLights = true
renderer.outputColorSpace = THREE.SRGBColorSpace
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.2
document.body.appendChild(renderer.domElement)

// ------------------------------------
// Scene + Camera
// ------------------------------------
const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  100
)
camera.position.set(6, 5, 6)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true

// ------------------------------------
// HDR Environment
// ------------------------------------
const pmrem = new THREE.PMREMGenerator(renderer)

new RGBELoader()
  .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr', (hdr) => {
    const envMap = pmrem.fromEquirectangular(hdr).texture
    scene.environment = envMap
    hdr.dispose()
  })

// ------------------------------------
// Lighting (strip lights)
// ------------------------------------
function lightPanel(x, y, z) {
  const light = new THREE.RectAreaLight(0xffffff, 4, 4, 1)
  light.position.set(x, y, z)
  light.lookAt(0, 0, 0)
  scene.add(light)
}

lightPanel(5, 5, 5)
lightPanel(-5, 5, 5)
lightPanel(0, 5, -5)

// ------------------------------------
// Materials
// ------------------------------------
const baseMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.5,
  metalness: 0.1,
  envMapIntensity: 1.5
})

const bodyMat = new THREE.MeshStandardMaterial({
  color: 0x3b3f4a,
  roughness: 0.5,
  metalness: 0.1,
  envMapIntensity: 1.5
})

const inlayMat = new THREE.MeshStandardMaterial({
  color: 0xaf6b4f,
  metalness: 1,
  roughness: 0.2,
  envMapIntensity: 3
})

const capMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 0.65,
  roughness: 0.03,
  ior: 1.49,
  thickness: 2,
  envMapIntensity: 2.5,
  clearcoat: 1,
  clearcoatRoughness: 0.05,
  attenuationColor: new THREE.Color('#ffd6c0'),
  attenuationDistance: 10,
  transparent: true,
  depthWrite: false
})

// ------------------------------------
// Geometry (simple placeholder)
// ------------------------------------
const geo = new THREE.BoxGeometry(2, 0.6, 2)

function createTile(y, mat) {
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.y = y
  return mesh
}

const base = createTile(0, baseMat)
const body = createTile(0.6, bodyMat)
const inlay = createTile(1.2, inlayMat)
const cap = createTile(1.8, capMat)

scene.add(base, body, inlay, cap)

// render order fix
base.renderOrder = 0
body.renderOrder = 1
inlay.renderOrder = 2
cap.renderOrder = 3

// ------------------------------------
// Animate
// ------------------------------------
function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}

animate()

// ------------------------------------
// Resize
// ------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})
</script>

</body>
</html>
